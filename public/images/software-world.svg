<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Software World Illustration</title>
  <desc id="desc">Abstract software themed illustration with globe, code blocks and network nodes.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1320" />
      <stop offset="100%" stop-color="#182b4d" />
    </linearGradient>
    <linearGradient id="globe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)" />

  <g opacity="0.2" stroke="#38bdf8" stroke-width="2">
    <path d="M120 720 C320 500 420 460 620 500 C820 540 920 470 1080 310" fill="none" />
    <path d="M80 600 C260 430 420 420 620 440 C820 460 980 390 1120 220" fill="none" />
  </g>

  <g transform="translate(600 430)">
    <circle r="220" fill="#0b1c35" stroke="#1d4ed8" stroke-width="4" />
    <circle r="210" fill="url(#globe)" opacity="0.15" />
    <ellipse rx="180" ry="70" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.7" />
    <ellipse rx="180" ry="70" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.4" transform="rotate(90)" />
    <ellipse rx="160" ry="190" fill="none" stroke="#38bdf8" stroke-width="2.5" opacity="0.45" />
    <ellipse rx="120" ry="190" fill="none" stroke="#38bdf8" stroke-width="2.5" opacity="0.45" />
  </g>

  <g transform="translate(160 170)">
    <rect width="320" height="210" rx="16" fill="url(#panel)" stroke="#334155" />
    <rect x="20" y="25" width="120" height="12" rx="6" fill="#64748b" />
    <rect x="20" y="60" width="220" height="8" rx="4" fill="#22d3ee" />
    <rect x="20" y="84" width="180" height="8" rx="4" fill="#38bdf8" />
    <rect x="20" y="108" width="240" height="8" rx="4" fill="#60a5fa" />
    <text x="20" y="165" fill="#93c5fd" font-family="Menlo, Monaco, Consolas, monospace" font-size="28">&lt;/&gt;</text>
  </g>

  <g transform="translate(720 560)">
    <rect width="320" height="210" rx="16" fill="url(#panel)" stroke="#334155" />
    <rect x="20" y="25" width="100" height="12" rx="6" fill="#64748b" />
    <rect x="20" y="60" width="250" height="8" rx="4" fill="#2dd4bf" />
    <rect x="20" y="84" width="230" height="8" rx="4" fill="#22d3ee" />
    <rect x="20" y="108" width="170" height="8" rx="4" fill="#38bdf8" />
    <circle cx="70" cy="160" r="12" fill="#0ea5e9" />
    <circle cx="120" cy="160" r="12" fill="#22d3ee" />
    <circle cx="170" cy="160" r="12" fill="#2dd4bf" />
  </g>

  <g fill="#22d3ee" opacity="0.8">
    <circle cx="290" cy="520" r="8" />
    <circle cx="400" cy="630" r="8" />
    <circle cx="940" cy="340" r="8" />
    <circle cx="840" cy="240" r="8" />
    <circle cx="640" cy="140" r="8" />
  </g>

  <g stroke="#22d3ee" opacity="0.5" stroke-width="2">
    <line x1="290" y1="520" x2="400" y2="630" />
    <line x1="400" y1="630" x2="600" y2="430" />
    <line x1="600" y1="430" x2="840" y2="240" />
    <line x1="840" y1="240" x2="940" y2="340" />
    <line x1="840" y1="240" x2="640" y2="140" />
  </g>
</svg>
